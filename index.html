<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danki Test Generator</title>

  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #fff;
      --text: #333;
      --accent: #007AFF;
      --border: #e1e5ea;
      --correct: #3c9d37;
      --partial: #e09f3e;
      --wrong: #d64541;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h2 {
      margin-bottom: 16px;
      color: var(--accent);
      font-size: 1.6rem;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 4px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.03);
    }
    label {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    label span { flex: 1; }
    input[type=number],
    input[type=text],
    textarea {
      flex: 1;
      padding: 8px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
    }
    input[type=file] { margin-left: 8px; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    #questions { margin-top: 16px; }
    .result-summary {
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 16px;
    }
    #overall_comment {
      text-align: center;
      margin-top: 8px;
      font-size: 1rem;
      color: var(--text);
    }

    .question {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .question h4 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 1.1rem;
    }
    .question label {
      margin: 10px 0;
      font-size: .95rem;
    }
    .question input[type=radio],
    .question input[type=checkbox] {
      margin-right: 8px;
    }

    .icon { font-size: 1.2rem; margin-right: 8px; }
    .icon.correct { color: var(--correct); }
    .icon.partial { color: var(--partial); }
    .icon.wrong   { color: var(--wrong); }

    .btn-feedback {
      background: var(--accent);
      font-size: .9rem;
      padding: 6px 10px;
      margin: 8px 0 16px;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
    }
    .feedback-text {
      display: none;
      margin-top: 8px;
      padding: 12px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: .9rem;
      color: var(--text);
    }
    .feedback-text.visible { display: block; }

    /* Loading Overlay */
    #loadingOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loading-card {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      text-align: center;
      width: 300px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    #loadingQuote {
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: var(--border);
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.1s linear;
    }

    /* Mobile fix */
    @media (max-width: 600px) {
      .question label {
        position: relative;
        padding-left: 32px;
        margin: 16px 0;
      }
      .question label input[type="radio"],
      .question label input[type="checkbox"] {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        margin: 0;
      }
      .question label span { display: block; }
    }

    /* === AUTH POPUP: SAME STYLE AS RESOURCES PAGE === */
    :root {
      --main-color: #b0e0e6;
      --accent-color: #89c2d9;
      --accent-color-dark: #78b0c7;
      --overlay-color: rgba(0,0,0,0.5);
      --modal-bg: #ffffff;
      --modal-shadow: 0 10px 40px rgba(0,0,0,0.1);
      --input-border: rgba(0,0,0,0.1);
      --ka-font: 'Helvetica Neue', Arial, sans-serif;
    }
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:10000}
    .modal.active{display:flex}
    .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:10000}
    .modal-content{position:relative;background:var(--modal-bg);border-radius:12px;width:90%;max-width:360px;padding:2.5em 1.5em;box-shadow:var(--modal-shadow);z-index:10001;text-align:center;font-family:var(--ka-font)}
    .modal-close{position:absolute;top:.75em;right:.75em;background:none;border:none;font-size:1.25em;color:#777;cursor:pointer;transition:color .2s}
    .modal-close:hover{color:#333}
    .modal-content h2{font-size:1.5em;margin-bottom:1em;letter-spacing:.05em;color:var(--accent-color-dark)}
    .modal-content form{display:flex;flex-direction:column;gap:1em}
    .modal-content input{padding:.8em 0;border:none;border-bottom:1px solid var(--input-border);font-size:1em;color:#333;background:transparent;transition:border-color .2s}
    .modal-content input:focus{outline:none;border-bottom-color:var(--accent-color-dark)}
    .modal-content .btn{margin-top:.5em;padding:.8em;font-size:1em;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:var(--accent-color);color:#fff;border:none;border-radius:5px;cursor:pointer;transition:background .3s}
    .modal-content .btn:hover{background:var(--accent-color-dark)}
    .modal-content .join-link{display:block;margin-top:1em;color:#555;font-size:.9em;text-decoration:none;transition:color .2s}
    .modal-content .join-link:hover{color:#333}
    .err{color:#d33;font-size:.9em;min-height:1.1em;margin-top:.25em}
    .ok{color:#0a9955}
    .fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s ease-out,transform .3s ease-out}
    .fade-in.visible{opacity:1;transform:translateY(0)}

    #signout-link {
      display:none;
      position:fixed;
      top:12px;
      right:16px;
      background: var(--accent);
      color:#fff;
      text-decoration:none;
      padding:8px 12px;
      border-radius:6px;
      font-size:.9rem;
      z-index: 10002;
    }
    #signout-link:hover { filter: brightness(0.95); }
  </style>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
  <!-- Tesseract.js UMD -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.4/dist/tesseract.min.js"></script>
</head>
<body>
  <a href="#" id="signout-link">Sign out</a>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="loading-card">
      <div id="loadingQuote">Hang tight...</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="loadingProgress"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card" id="setup">
      <h2>Test Parameters &amp; Documents</h2>
      <label><span>Multiple Choice:</span><input type="number" id="num_mc" value="0" min="0"/></label>
      <label><span>Multi-Answer:</span><input type="number" id="num_multi" value="0" min="0"/></label>
      <label><span>Short Answer:</span><input type="number" id="num_short" value="0" min="0"/></label>
      <label><span>Long Answer:</span><input type="number" id="num_long" value="0" min="0"/></label>
      <label><span>MC Options:</span><input type="number" id="mc_options" value="4" min="2"/></label>
      <label><span>Difficulty (1–10):</span><input type="number" id="difficulty" value="5" min="1" max="10"/></label>
      <label><span>Content PDFs (1 or 2):</span><input type="file" id="content_files" accept="application/pdf" multiple/></label>
      <label><span>Grading Rubrics (OPTIONAL):</span><input type="file" id="grading_files" accept="application/pdf" multiple/></label>
      <button id="btn_generate" class="auth-btn">Generate Test</button>
    </div>

    <div class="card" id="questions" style="display:none">
      <div class="result-summary" id="result_summary"></div>
      <h2>Your Test</h2>
      <form id="test_form"></form>
      <button id="btn_submit" class="auth-btn">Submit Test</button>
      <button id="btn_new" style="display:none; margin-left:8px;">New Test</button>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="auth-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content fade-in" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <button class="modal-close" aria-label="Close">×</button>
      <h2 id="auth-title">Student Login</h2>
      <form id="login-form" novalidate>
        <input id="email" type="email" placeholder="Email address" autocomplete="username" required />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button id="login-btn" type="submit" class="btn">Sign In</button>
        <div id="auth-error" class="err"></div>
      </form>
      <a href="#" id="forgot" class="join-link">Forgot password?</a>
      <a href="../bookings/" class="join-link">Join Kav Academy</a>
    </div>
  </div>

  <script>
    window.__FIREBASE_CONFIG__ = {

  <!-- Auth system -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      sendPasswordResetEmail, setPersistence, browserLocalPersistence, signOut
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    const app  = initializeApp(window.__FIREBASE_CONFIG__);
    const auth = getAuth(app);
    setPersistence(auth, browserLocalPersistence).catch(()=>{});

    const $  = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => [...r.querySelectorAll(s)];

    const modal        = $("#auth-modal");
    const modalContent = modal.querySelector(".modal-content"); /* <-- needed for visibility toggle */
    const loginForm    = $("#login-form");
    const emailEl      = $("#email");
    const pwEl         = $("#password");
    const errEl        = $("#auth-error");
    const loginBtn     = $("#login-btn");
    const forgotLink   = $("#forgot");
    const signoutLink  = $("#signout-link");

    const openModal  = () => {
      modal.classList.add("active");
      modal.setAttribute("aria-hidden","false");
      modalContent.classList.add("visible");     // <-- make the panel visible
    };
    const closeModal = () => {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden","true");
      modalContent.classList.remove("visible");  // <-- reset for next time
    };

    let pendingHref = null;
    let pendingAction = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        signoutLink.style.display = "inline";
        if (pendingHref && pendingHref !== "#") {
          const to = pendingHref; pendingHref = null;
          closeModal();
          location.href = to;
          return;
        }
        if (typeof pendingAction === "function") {
          const fn = pendingAction; pendingAction = null;
          closeModal();
          requestAnimationFrame(() => fn());
          return;
        }
        closeModal();
      } else {
        signoutLink.style.display = "none";
      }
    });

    $$(".auth-btn").forEach(el => {
      el.addEventListener("click", (e) => {
        if (!auth.currentUser) {
          e.preventDefault();
          e.stopImmediatePropagation?.();
          e.stopPropagation();

          const tag = el.tagName.toLowerCase();
          if (tag === "a") {
            pendingHref = el.getAttribute("href") || "#";
          } else {
            pendingAction = () => el.click();
          }
          openModal();
        }
      }, true);
    });

    $(".modal-close")?.addEventListener("click", closeModal);
    $(".modal-backdrop")?.addEventListener("click", closeModal);

    forgotLink?.addEventListener("click", async (e) => {
      e.preventDefault();
      const email = emailEl.value.trim();
      if (!email) { errEl.textContent = "Enter your email above first."; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        errEl.classList.add("ok");
        errEl.textContent = "Reset link sent if the email exists.";
        setTimeout(()=>{ errEl.textContent=""; errEl.classList.remove("ok"); }, 4000);
      } catch (err) {
        errEl.textContent = human(err);
      }
    });

    loginForm?.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      const email = emailEl.value.trim();
      const pw    = pwEl.value;
      if (!email || !pw) { errEl.textContent = "Email and password required."; return; }
      loginBtn.disabled = true; loginBtn.textContent = "Signing in…";
      try {
        await signInWithEmailAndPassword(auth, email, pw);
      } catch (err) {
        errEl.textContent = human(err);
      } finally {
        loginBtn.disabled = false; loginBtn.textContent = "Sign In";
      }
    });

    function human(err){
      const code = String(err?.code || "");
      if (code.includes("user-not-found") || code.includes("wrong-password")) return "Invalid email or password.";
      if (code.includes("too-many-requests")) return "Too many attempts. Try again later.";
      if (code.includes("network-request-failed")) return "Network error. Check your connection.";
      return "Login failed. " + (err?.message || "Try again.");
    }

    signoutLink?.addEventListener("click", async (e) => {
      e.preventDefault();
      try { await signOut(auth); } catch(_) {}
    });
  </script>

  <!-- Your existing app logic -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
